name: Notion to EC Mall Sync

# トリガー設定
on:
  # 定期実行: 3時間ごと
  schedule:
    - cron: '0 */3 * * *'
  
  # 手動実行も可能
  workflow_dispatch:
  
  # プッシュ時（テスト用）
  push:
    branches:
      - main
    paths:
      - 'sync.py'
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/sync.yml'

# 環境変数
env:
  PYTHON_VERSION: '3.11'

jobs:
  sync:
    name: 商品データ同期
    runs-on: ubuntu-latest
    
    steps:
      # 1. リポジトリをチェックアウト
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      # 2. Pythonセットアップ
      - name: 🐍 Setup Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      # 3. 依存関係インストール
      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      # 4. 同期スクリプト実行
      - name: 🔄 Run sync script
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          YAHOO_API_KEY: ${{ secrets.YAHOO_API_KEY }}
          YAHOO_API_SECRET: ${{ secrets.YAHOO_API_SECRET }}
          YAHOO_STORE_ACCOUNT: ${{ secrets.YAHOO_STORE_ACCOUNT }}
          RAKUTEN_SERVICE_SECRET: ${{ secrets.RAKUTEN_SERVICE_SECRET }}
          RAKUTEN_LICENSE_KEY: ${{ secrets.RAKUTEN_LICENSE_KEY }}
          DRY_RUN: ${{ vars.DRY_RUN || 'false' }}
        run: |
          python sync.py
      
      # 5. ログをアーティファクトとして保存
      - name: 📄 Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sync-logs-${{ github.run_number }}
          path: |
            sync.log
          retention-days: 30
      
      # 6. 結果を通知（オプション）
      - name: 📢 Notify on failure
        if: failure()
        run: |
          echo "同期処理が失敗しました"
          echo "ログを確認してください: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          # ここにSlack/Discord/メール通知などを追加可能

  # 月次レポート生成（オプション）
  monthly-report:
    name: 月次レポート
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 0 1 * *'  # 毎月1日
    
    steps:
      - name: 📊 Generate monthly report
        run: |
          echo "月次レポート生成機能は今後実装予定"
          # レポート生成ロジックをここに追加
